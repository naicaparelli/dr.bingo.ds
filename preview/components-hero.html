<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#0D051E;font-family:var(--font-sans)}
  .card{width:700px;padding:22px 26px;box-sizing:border-box;background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);color:var(--fg-primary)}
  .title{font:900 13px/1 var(--font-sans);letter-spacing:.08em;text-transform:uppercase;margin:0 0 4px}
  .sub{font:400 11px/1.4 var(--font-sans);color:var(--fg-muted);margin:0 0 18px}
  .banner{height:160px;border-radius:20px;position:relative;overflow:hidden;background:linear-gradient(135deg,#AB00B9 0%,#3B00CC 100%);padding:22px 24px;display:flex;flex-direction:column;justify-content:space-between;box-shadow:0 16px 40px rgba(0,0,0,.5),0 0 32px rgba(171,0,185,.35)}
  .banner::before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 80% 30%,rgba(252,238,33,.25),transparent 50%),radial-gradient(circle at 20% 80%,rgba(230,25,255,.35),transparent 55%);mix-blend-mode:screen}
  .kick{font:700 11px/1 Inter;letter-spacing:.14em;text-transform:uppercase;color:#FCEE21;position:relative;text-shadow:0 2px 12px rgba(252,238,33,.5)}
  .head{font-family:'Luckiest Guy',cursive;font-size:44px;line-height:1;color:#fff;letter-spacing:.02em;text-shadow:0 4px 22px rgba(222,0,255,.6);position:relative}
  .row{display:flex;align-items:end;justify-content:space-between;position:relative}
  .btn{background:linear-gradient(135deg,#CCFF00,#00BA33);color:#0d2600;border-radius:9999px;padding:10px 18px;font:800 11px/1 Inter;letter-spacing:.08em;text-transform:uppercase;box-shadow:0 0 18px rgba(204,255,0,.55)}
  .doc{font-size:64px;line-height:1;filter:drop-shadow(0 8px 20px rgba(0,0,0,.5))}
</style></head>
<body>
<div class="card">
  <p class="title">Hero Banner · Carousel</p>
  <p class="sub">Full-bleed gradient with radial highlight glows, display headline, gold kicker, lime CTA. Home carousel uses 3 of these in rotation.</p>
  <div class="banner">
    <div>
      <div class="kick">Lançamento oficial</div>
      <div class="head">Em Abril</div>
    </div>
    <div class="row">
      <span class="btn">Baixe agora</span>
      <span class="doc">🎩</span>
    </div>
  </div>
</div></body></html>
