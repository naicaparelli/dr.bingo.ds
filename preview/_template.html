<!doctype html>
<html><head><meta charset="utf-8"><title>Card base</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg-app);}
  .card{
    width:700px;min-height:140px;
    padding:24px 28px;box-sizing:border-box;
    background:var(--bg-surface);
    border:1px solid var(--border-subtle);
    border-radius:var(--radius-lg);
    color:var(--fg-primary);
  }
  .row{display:flex;gap:12px;align-items:stretch;flex-wrap:wrap}
  .col{display:flex;flex-direction:column;gap:8px}
  .eyebrow{font:var(--fw-bold) 10px/1 var(--font-sans);letter-spacing:0.12em;text-transform:uppercase;color:var(--fg-muted);margin-bottom:12px}
  .hint{font:var(--fw-regular) 11px/1.4 var(--font-sans);color:var(--fg-muted)}
  .mono{font-family:var(--font-mono);font-size:11px;color:var(--fg-muted)}
</style></head><body></body></html>
