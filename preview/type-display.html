<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#0D051E;font-family:var(--font-sans)}
  .card{width:700px;padding:24px 28px;box-sizing:border-box;background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);color:var(--fg-primary)}
  .title{font:900 13px/1 var(--font-sans);letter-spacing:.08em;text-transform:uppercase;margin:0 0 4px}
  .sub{font:400 11px/1.4 var(--font-sans);color:var(--fg-muted);margin:0 0 18px}
  .row{display:flex;align-items:baseline;gap:18px;padding:10px 0;border-top:1px solid rgba(243,230,250,.08)}
  .row:first-of-type{border-top:0}
  .meta{min-width:140px;color:var(--fg-muted);font:500 11px/1.2 var(--font-mono)}
  .name{font:800 11px/1 var(--font-sans);letter-spacing:.08em;text-transform:uppercase;color:var(--fg-primary);display:block;margin-bottom:3px}
  .specimen{color:#fff;text-shadow:0 0 32px rgba(222,0,255,.35)}
</style></head>
<body>
<div class="card">
  <p class="title">Display — Luckiest Guy</p>
  <p class="sub">Reserved for the wordmark, festive numbers and marquee headlines. Never for body copy or UI chrome.</p>
  <div class="row">
    <div class="meta"><span class="name">display-60</span>60 / 100% / 0.02em</div>
    <div class="specimen" style="font-family:'Luckiest Guy',cursive;font-size:60px;line-height:1;letter-spacing:.02em">Dr. Bingo!</div>
  </div>
  <div class="row">
    <div class="meta"><span class="name">display-48</span>48 / 100% / 0.02em</div>
    <div class="specimen" style="font-family:'Luckiest Guy',cursive;font-size:48px;line-height:1;letter-spacing:.02em">Jackpot R$ 12M</div>
  </div>
</div></body></html>
