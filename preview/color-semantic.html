<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#0D051E;font-family:var(--font-sans)}
  .card{width:700px;padding:22px 26px;box-sizing:border-box;background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);color:var(--fg-primary)}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
  .state{border-radius:14px;padding:14px 16px;display:flex;flex-direction:column;gap:6px;border:1px solid}
  .state .dot{width:14px;height:14px;border-radius:50%;margin-bottom:4px}
  .state .name{font:800 11px/1 var(--font-sans);letter-spacing:.08em;text-transform:uppercase}
  .state .hex{font:500 10px/1 var(--font-mono);opacity:.75}
  .state .msg{font:500 12px/1.3 var(--font-sans);margin-top:4px}
  .title{font:900 13px/1 var(--font-sans);letter-spacing:.08em;text-transform:uppercase;margin:0 0 4px}
  .sub{font:400 11px/1.4 var(--font-sans);color:var(--fg-muted);margin:0 0 14px}
</style></head>
<body>
<div class="card">
  <p class="title">Semantic States</p>
  <p class="sub">Feedback colors tuned for a dark interface. Always pair with an icon or label — never color alone.</p>
  <div class="grid">
    <div class="state" style="background:rgba(11,188,50,.14);border-color:rgba(11,188,50,.4);color:#CCFF90">
      <span class="dot" style="background:#0BBC32;box-shadow:0 0 10px #0BBC32"></span>
      <span class="name">Success</span>
      <span class="hex">#0BBC32</span>
      <span class="msg" style="color:#fff">Ganhou R$ 42,00 🎉</span>
    </div>
    <div class="state" style="background:rgba(247,147,30,.14);border-color:rgba(247,147,30,.4);color:#FFD699">
      <span class="dot" style="background:#F7931E;box-shadow:0 0 10px #F7931E"></span>
      <span class="name">Warning</span>
      <span class="hex">#F7931E</span>
      <span class="msg" style="color:#fff">Saldo baixo</span>
    </div>
    <div class="state" style="background:rgba(255,51,85,.14);border-color:rgba(255,51,85,.4);color:#FFB3BD">
      <span class="dot" style="background:#FF3355;box-shadow:0 0 10px #FF3355"></span>
      <span class="name">Error</span>
      <span class="hex">#FF3355</span>
      <span class="msg" style="color:#fff">Pagamento falhou</span>
    </div>
    <div class="state" style="background:rgba(143,4,224,.14);border-color:rgba(143,4,224,.4);color:#D9B3FF">
      <span class="dot" style="background:#8F04E0;box-shadow:0 0 10px #8F04E0"></span>
      <span class="name">Info</span>
      <span class="hex">#8F04E0</span>
      <span class="msg" style="color:#fff">Novo torneio hoje</span>
    </div>
  </div>
</div></body></html>
