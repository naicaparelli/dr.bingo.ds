<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#0D051E;font-family:var(--font-sans)}
  .card{width:700px;padding:22px 26px;box-sizing:border-box;background:linear-gradient(180deg,#261A2E,#15091F);border:1px solid rgba(255,255,255,.06);border-radius:var(--radius-lg);color:var(--fg-primary);display:flex;align-items:center;gap:24px}
  .mark{font-family:'Luckiest Guy',cursive;font-size:64px;line-height:1;letter-spacing:.02em;background:linear-gradient(180deg,#AB00B9,#3B00CC);-webkit-background-clip:text;background-clip:text;color:transparent;text-shadow:0 0 40px rgba(222,0,255,.3)}
  .mark b{background:linear-gradient(135deg,#FCEE21,#F7931E);-webkit-background-clip:text;background-clip:text;color:transparent;font-size:22px;letter-spacing:.06em;vertical-align:20px;margin-left:6px;font-family:Inter;font-weight:800}
  .right{flex:1}
  .right h2{font:800 13px/1 Inter;letter-spacing:.08em;text-transform:uppercase;margin:0 0 6px;color:#fff}
  .right p{font:400 12px/1.5 Inter;color:var(--fg-muted);margin:0}
</style></head>
<body>
<div class="card">
  <div class="mark">Dr. BINGO<b>BET</b></div>
  <div class="right">
    <h2>Wordmark</h2>
    <p>"Dr." + "BINGO" in Luckiest Guy (violet gradient fill) anchored by a gold "BET" pill. Minimum clearspace = height of the "B". Use on dark surfaces only; place a blurred violet halo behind it on busy imagery.</p>
  </div>
</div></body></html>
