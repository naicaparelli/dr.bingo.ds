<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#0D051E;font-family:var(--font-sans)}
  .card{width:700px;padding:24px 28px;box-sizing:border-box;background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);color:var(--fg-primary)}
  .title{font:900 13px/1 var(--font-sans);letter-spacing:.08em;text-transform:uppercase;margin:0 0 4px}
  .sub{font:400 11px/1.4 var(--font-sans);color:var(--fg-muted);margin:0 0 18px}
  .bar{background:#15091F;border-radius:9999px;padding:8px 12px;display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px;border:1px solid rgba(243,230,250,.06)}
  .left, .right{display:flex;align-items:center;gap:10px}
  .logo{font-family:'Luckiest Guy',cursive;font-size:18px;letter-spacing:.04em;color:#fff}
  .logo b{background:linear-gradient(135deg,#FCEE21,#F7931E);color:#261A2E;padding:2px 6px;border-radius:6px;margin-left:4px;font:800 9px/1 Inter;letter-spacing:.1em;vertical-align:2px}
  .timer{background:rgba(243,230,250,.08);border-radius:9999px;padding:6px 10px;font:700 12px/1 'JetBrains Mono',monospace;color:#fff;display:inline-flex;gap:6px;align-items:center}
  .bal{color:#fff;font:700 13px/1 'JetBrains Mono',monospace;margin-right:8px}
  .dep{background:linear-gradient(135deg,#CCFF00,#00BA33);color:#0d2600;border-radius:9999px;padding:7px 14px;font:800 11px/1 Inter;letter-spacing:.08em;text-transform:uppercase;box-shadow:0 0 14px rgba(204,255,0,.35)}
  .ava{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#DE00FF,#AB00B9);display:flex;align-items:center;justify-content:center;color:#fff;font:800 11px/1 Inter}
  .tabbar{background:linear-gradient(180deg,rgba(38,26,46,0),rgba(13,5,30,.9));border-radius:9999px;padding:8px;display:flex;gap:4px;border:1px solid rgba(243,230,250,.06)}
  .tab{padding:10px 18px;border-radius:9999px;font:800 11px/1 Inter;letter-spacing:.06em;text-transform:uppercase;color:var(--fg-muted);cursor:pointer}
  .tab.active{background:linear-gradient(135deg,#DE00FF,#AB00B9);color:#fff;box-shadow:0 0 18px rgba(230,25,255,.45)}
</style></head>
<body>
<div class="card">
  <p class="title">Top Bar & Tabs</p>
  <p class="sub">Dark pill-bar with wordmark left, session timer center, balance + deposit CTA right. Tab bar uses gradient-filled active state with glow.</p>
  <div class="bar">
    <div class="left"><span class="logo">Dr. BINGO<b>BET</b></span>
      <span class="timer">⏱ 01m 30s</span>
    </div>
    <div class="right">
      <span style="color:#FCEE21">🔔</span>
      <span class="dep">Depósito</span>
      <span class="bal">R$ 321.434,20</span>
      <span class="ava">JL</span>
    </div>
  </div>
  <div class="tabbar">
    <span class="tab active">★ Favoritos</span>
    <span class="tab">Bingo</span>
    <span class="tab">Slots</span>
    <span class="tab">Mais Jogados</span>
    <span class="tab">Live Cassino</span>
    <span class="tab">Crash</span>
  </div>
</div></body></html>
