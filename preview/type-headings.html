<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#0D051E;font-family:var(--font-sans)}
  .card{width:700px;padding:24px 28px;box-sizing:border-box;background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);color:var(--fg-primary)}
  .title{font:900 13px/1 var(--font-sans);letter-spacing:.08em;text-transform:uppercase;margin:0 0 4px}
  .sub{font:400 11px/1.4 var(--font-sans);color:var(--fg-muted);margin:0 0 18px}
  .row{display:flex;align-items:baseline;gap:18px;padding:8px 0;border-top:1px solid rgba(243,230,250,.08)}
  .row:first-of-type{border-top:0}
  .meta{min-width:150px;color:var(--fg-muted);font:500 11px/1.2 var(--font-mono)}
  .name{font:800 11px/1 var(--font-sans);letter-spacing:.08em;text-transform:uppercase;color:var(--fg-primary);display:block;margin-bottom:3px}
</style></head>
<body>
<div class="card">
  <p class="title">Headings — Inter Bold</p>
  <p class="sub">Section titles and dialog headers. Tight 1.2 line-height; never all-caps.</p>
  <div class="row"><div class="meta"><span class="name">heading-24</span>Inter 700 · 24/1.2</div>
    <div style="font:700 24px/1.2 Inter">Mais Jogados esta semana</div></div>
  <div class="row"><div class="meta"><span class="name">heading-20</span>Inter 700 · 20/1.2</div>
    <div style="font:700 20px/1.2 Inter">Favoritos do Dr. Bingo</div></div>
  <div class="row"><div class="meta"><span class="name">heading-18</span>Inter 700 · 18/1.2</div>
    <div style="font:700 18px/1.2 Inter">Torneios ativos</div></div>
</div></body></html>
