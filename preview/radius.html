<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#0D051E;font-family:var(--font-sans)}
  .card{width:700px;padding:24px 28px;box-sizing:border-box;background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);color:var(--fg-primary)}
  .title{font:900 13px/1 var(--font-sans);letter-spacing:.08em;text-transform:uppercase;margin:0 0 4px}
  .sub{font:400 11px/1.4 var(--font-sans);color:var(--fg-muted);margin:0 0 18px}
  .row{display:grid;grid-template-columns:repeat(8,1fr);gap:12px;align-items:end}
  .r{display:flex;flex-direction:column;align-items:center;gap:8px}
  .box{background:linear-gradient(135deg,#3B00CC,#AB00B9);border:1px solid rgba(255,255,255,.1);width:56px;height:56px}
  .lbl{font:700 10px/1.2 var(--font-sans);color:var(--fg-muted);text-align:center}
  .lbl b{display:block;color:#fff;margin-bottom:2px;letter-spacing:.04em;text-transform:uppercase}
</style></head>
<body>
<div class="card">
  <p class="title">Radius</p>
  <p class="sub">Generous, friendly curvature. 24 and pill dominate the UI; 56 is reserved for hero panels.</p>
  <div class="row">
    <div class="r"><div class="box" style="border-radius:4px"></div><div class="lbl"><b>xs</b>4px</div></div>
    <div class="r"><div class="box" style="border-radius:8px"></div><div class="lbl"><b>sm</b>8</div></div>
    <div class="r"><div class="box" style="border-radius:12px"></div><div class="lbl"><b>md</b>12</div></div>
    <div class="r"><div class="box" style="border-radius:16px"></div><div class="lbl"><b>lg</b>16</div></div>
    <div class="r"><div class="box" style="border-radius:24px"></div><div class="lbl"><b>xl</b>24</div></div>
    <div class="r"><div class="box" style="border-radius:32px"></div><div class="lbl"><b>2xl</b>32</div></div>
    <div class="r"><div class="box" style="border-radius:56px"></div><div class="lbl"><b>3xl</b>56</div></div>
    <div class="r"><div class="box" style="border-radius:9999px"></div><div class="lbl"><b>pill</b>full</div></div>
  </div>
</div></body></html>
